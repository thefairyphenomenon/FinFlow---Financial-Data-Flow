version: "3.9"

# DataFlow — Full Stack Docker Compose
# Runs: PostgreSQL, Redis, FastAPI, Airflow
# Start everything: docker-compose up -d

services:

  # ── PostgreSQL with TimescaleDB extension ──────────────────────────────────
  # TimescaleDB is the standard for financial time-series data
  # Free, open source, fully compatible with PostgreSQL
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: dataflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dataflow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dataflow_pass}
      POSTGRES_DB: ${POSTGRES_DB:-dataflow_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dataflow_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dataflow_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes  # Persistence enabled
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── DataFlow FastAPI ───────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: dataflow_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-dataflow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dataflow_pass}
      POSTGRES_DB: ${POSTGRES_DB:-dataflow_db}
      REDIS_HOST: redis
      FRED_API_KEY: ${FRED_API_KEY:-}
      APP_ENV: ${APP_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data/logs:/app/data/logs

  # ── Airflow Init (runs once) ───────────────────────────────────────────────
  airflow-init:
    image: apache/airflow:2.8.0
    container_name: dataflow_airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-dataflow_user}:${POSTGRES_PASSWORD:-dataflow_pass}@postgres:5432/airflow_db
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --firstname DataFlow --lastname Admin
          --role Admin --email admin@dataflow.io --password admin
      "
    restart: on-failure

  # ── Airflow Webserver ──────────────────────────────────────────────────────
  airflow-webserver:
    image: apache/airflow:2.8.0
    container_name: dataflow_airflow_web
    restart: unless-stopped
    depends_on:
      - airflow-init
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-dataflow_user}:${POSTGRES_PASSWORD:-dataflow_pass}@postgres:5432/airflow_db
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - .:/opt/airflow/dataflow  # Mount project so DAGs can import it
    command: webserver

  # ── Airflow Scheduler ─────────────────────────────────────────────────────
  airflow-scheduler:
    image: apache/airflow:2.8.0
    container_name: dataflow_airflow_scheduler
    restart: unless-stopped
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-dataflow_user}:${POSTGRES_PASSWORD:-dataflow_pass}@postgres:5432/airflow_db
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - .:/opt/airflow/dataflow
    command: scheduler

# ── Persistent Volumes ─────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: dataflow_network
